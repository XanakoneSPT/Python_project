<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Camera Configuration</title>

    <!-- Google Fonts for Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Styling -->
    <style>
        :root {
            --bg-primary: #0f1229;
            --bg-secondary: #1a1f3d;
            --accent-color: #4ecdc4;
            --text-primary: #ffffff;
            --text-secondary: #b0b7c6;
            --delete-color: #ff5b5b;
            --cancel-color: #6c757d;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--bg-secondary);
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        p {
            font-size: 1rem;
            margin-bottom: 30px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        p strong {
            color: var(--text-primary);
        }

        .button-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        button, a {
            flex: 1;
            padding: 15px;
            font-size: 1rem;
            border-radius: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button {
            background-color: var(--delete-color);
            color: var(--text-primary);
        }

        button:hover {
            background-color: #ff3f3f;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255, 91, 91, 0.3);
        }

        a {
            background-color: var(--bg-primary);
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        a:hover {
            background-color: var(--accent-color);
            color: var(--bg-primary);
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 25px;
                margin: 0 10px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .button-container {
                flex-direction: column;
                gap: 15px;
            }

            button, a {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Delete Camera Configuration</h1>
        <p>Are you sure you want to delete "<strong>{{ config.name }}</strong>"?</p>

        <form method="POST">
            {% csrf_token %}
            <div class="button-container">
                <button type="submit">Yes, Delete</button>
                <a href="{% url 'camera_config_list' %}">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
